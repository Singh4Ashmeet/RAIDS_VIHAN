services:
  - type: web
    name: raid-nexus-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://raid-nexus.onrender.com"]'
      - key: CORS_ORIGIN_REGEX
        value: 'https://.*\.(netlify\.app|vercel\.app)'
      - key: ENABLE_NLP_TRIAGE
        value: "false"
      - key: ENABLE_TRANSLATION
        value: "false"
      - key: ENABLE_ANOMALY_DETECTION
        value: "true"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: USER_USERNAME
        value: user
      - key: USER_PASSWORD
        sync: false
