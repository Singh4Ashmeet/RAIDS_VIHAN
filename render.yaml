services:
  - type: web
    name: raid-nexus-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://raid-nexus.onrender.com"]'
      - key: ENABLE_NLP_TRIAGE
        value: "false"
      - key: ENABLE_TRANSLATION
        value: "false"
      - key: ENABLE_ANOMALY_DETECTION
        value: "true"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: USER_USERNAME
        value: user
      - key: USER_PASSWORD
        value: user123
