[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  VITE_WS_BASE_URL = "https://raid-nexus.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://raid-nexus.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ws/*"
  to = "https://raid-nexus.onrender.com/ws/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
